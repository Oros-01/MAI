<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Кнопка</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      margin: 0;
      background: #f0f0f0;
    }
    button {
      padding: 20px 40px;
      font-size: 20px;
      cursor: pointer;
      border: none;
      border-radius: 10px;
      background: #4CAF50;
      color: white;
      margin-bottom: 30px;
    }
    button:hover { background: #45a049; }
    #indicator {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: gray;
      transition: background 0.3s;
    }
    #indicator.on { background: #ff4444; }
    #label { margin-top: 10px; font-size: 18px; }
  </style>
</head>
<body>
  <button onclick="pressButton()">Нажать кнопку</button>
  <div id="indicator"></div>
  <div id="label">Не нажато</div>

  <script>
  const btn = document.querySelector('button');

  btn.addEventListener('mousedown', async () => {
    await fetch('/press', { method: 'POST' });
  });

  btn.addEventListener('mouseup', async () => {
    await fetch('/reset', { method: 'POST' });
  });

  // Для телефона (touch события)
  btn.addEventListener('touchstart', async (e) => {
    e.preventDefault();
    await fetch('/press', { method: 'POST' });
  });

  btn.addEventListener('touchend', async (e) => {
    e.preventDefault();
    await fetch('/reset', { method: 'POST' });
  });

  async function checkState() {
    const res = await fetch('/state');
    const data = await res.json();
    const ind = document.getElementById('indicator');
    const lbl = document.getElementById('label');
    if (data.pressed) {
      ind.classList.add('on');
      lbl.textContent = 'Нажато!';
    } else {
      ind.classList.remove('on');
      lbl.textContent = 'Не нажато';
    }
  }

  setInterval(checkState, 200);
  checkState();
</script>
</body>
</html>
